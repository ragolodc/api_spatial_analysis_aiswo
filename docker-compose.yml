services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${API_CONTAINER_NAME}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      clickhouse:
        condition: service_started
    ports:
      - "${API_GEOQUIBIDY_PORT}:${API_PORT}"
    volumes:
      - .:/app
    command: uvicorn src.main:app --host ${API_HOST} --port ${API_PORT} --reload

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${WORKER_CONTAINER_NAME:-aiswo_spatial_worker}
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
      clickhouse:
        condition: service_started
    volumes:
      - .:/app
    command: celery -A src.shared.workers.celery_app worker --loglevel=INFO --queues=${PROFILE_ANALYSIS_QUEUE:-profile_analysis}

  db:
    image: postgis/postgis:16-3.4
    container_name: ${POSTGRES_CONTAINER_NAME}
    env_file:
      - .env
    ports:
      - "${POSTGRES_GEOQUBIDY_PORT}:${POSTGRES_PORT}"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ${REDIS_CONTAINER_NAME:-aiswo_redis}
    ports:
      - "${REDIS_PORT:-6379}:6379"

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: ${CLICKHOUSE_CONTAINER_NAME:-aiswo_clickhouse}
    env_file:
      - .env
    ports:
      - "${CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    volumes:
      - clickhouse_data:/var/lib/clickhouse

volumes:
  db_data:
  clickhouse_data:
